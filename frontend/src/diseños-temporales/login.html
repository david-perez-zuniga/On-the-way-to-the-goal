    <div class="max-w-7xl mx-auto px-gutter h-16 flex items-center justify-between">

  </header>
  <!-- Main Content Canvas -->
  <main class="flex-grow flex items-center justify-center px-gutter py-stack-lg">
    <div class="w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
      <!-- White Card -->
      <div class="bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-sm glass-card">
        <!-- Brand Logo Center -->
        <div class="flex justify-center mb-stack-lg">
          <img alt="Logo" class="h-16 w-16 object-contain"
            src="https://lh3.googleusercontent.com/aida/AP1WRLtUo3LLjCUkQSX4KJbBzIMX2fle5BDQh0QbDBf0im3jyr-DUqQ8l1InpNLpwB2cBR-COs07ERaePK3k6arpLf6WQ1dmzKEZNZNuLBPDqubQ5b26McxSgl6S1wmo0F-yUHE5MIe3ipzhVu5pixps5_kk44XU9OqzSDyeK2bnckhqKxY33p9XZEr-lcl8xTX2BBJ97O7toUGURQ7VnHOS9UQ3GetAHPjGkgh9Z7x3FZl096sHsEvZWjjfX11A">
        </div>
        <!-- Text Header -->
        <div class="text-center mb-stack-lg">
          <h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">
            Bienvenido de nuevo
          </h1>
          <p class="font-body-md text-body-md text-on-surface-variant">
            Continúa tu viaje hacia tus metas
          </p>
        </div>
        <!-- Login Form -->
        <form class="space-y-6" onsubmit="return false;">
          <!-- Email Field -->
          <div class="space-y-2 group">
            <label
              class="font-label-md text-label-md text-on-surface-variant ml-1 group-focus-within:text-primary transition-colors"
              for="email">
              Correo electrónico
            </label>
            <div
              class="relative flex items-center border-b border-outline-variant py-2 input-focus-effect transition-all duration-300">
              <span class="material-symbols-outlined text-outline absolute left-0" data-icon="mail">mail</span>
              <input
                class="w-full bg-transparent border-none focus:ring-0 pl-10 py-1 text-on-surface placeholder:text-outline-variant font-body-md"
                id="email" name="email" placeholder="ejemplo@correo.com" type="email">
            </div>
          </div>
          <!-- Password Field -->
          <div class="space-y-2 group">
            <label
              class="font-label-md text-label-md text-on-surface-variant ml-1 group-focus-within:text-primary transition-colors"
              for="password">
              Contraseña
            </label>
            <div
              class="relative flex items-center border-b border-outline-variant py-2 input-focus-effect transition-all duration-300">

          </div>
          <!-- Forgot Password -->

            type="submit">
            <span class="">Iniciar sesión</span>
            <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform"
              data-icon="arrow_forward">arrow_forward</span>
          </button>
        </form>
        <!-- Footer Link -->

  <!-- Micro-interaction Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const inputs = document.querySelectorAll('input');

      inputs.forEach(input => {
        input.addEventListener('focus', () => {
          const container = input.closest('.input-focus-effect');
          container.style.borderBottomWidth = '2px';
          container.style.paddingBottom = '7px'; // Counteract the extra 1px border
        });

        input.addEventListener('blur', () => {
          const container = input.closest('.input-focus-effect');
          container.style.borderBottomWidth = '1px';
          container.style.paddingBottom = '8px';
        });
      });
    });
  </script>
